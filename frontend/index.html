<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Simon 个人主页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="container">
      <h1 class="title">{{ profile.name }}</h1>
      <h2 class="subtitle">{{ profile.title }}</h2>
      <ul class="skills">
        <li v-for="skill in profile.skills" :key="skill">{{ skill }}</li>
      </ul>
      <div class="add-skill">
        <input v-model="newSkill" placeholder="输入新技能" />
        <button @click="addSkill">添加</button>
      </div>
      <a class="link" :href="profile.link" target="_blank">访问我的 GitHub</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
